<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacias Cuxibamba — POS Offline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #1e3a5f;
    --blue-dark: #142a45;
    --yellow: #f5c518;
    --yellow-soft: #fef9e7;
    --bg: #fafafa;
    --zinc-50: #fafafa;
    --zinc-100: #f4f4f5;
    --zinc-200: #e4e4e7;
    --zinc-300: #d4d4d8;
    --zinc-400: #a1a1aa;
    --zinc-500: #71717a;
    --zinc-700: #3f3f46;
    --zinc-800: #27272a;
    --zinc-900: #18181b;
    --green: #22c55e;
    --green-soft: #f0fdf4;
    --red: #ef4444;
    --red-soft: #fef2f2;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--zinc-900);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  .scene { height: 100vh; display: flex; flex-direction: column; }

  /* ─── Top bar ─── */
  .topbar {
    background: var(--blue);
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--yellow);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .topbar .wifi {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topbar .wifi-dot {
    width: 10px;
    height: 10px;
    background: var(--green);
    transition: background 0.5s ease;
  }

  .topbar .wifi-dot.off { background: var(--red); }

  .topbar .wifi-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }

  /* ─── Main ─── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ─── POS ─── */
  .pos {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--zinc-200);
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--zinc-400);
    padding: 20px 32px 12px;
  }

  .pos-items { flex: 1; padding: 0 32px; overflow: hidden; }

  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--zinc-100);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.4s ease;
  }

  .item.show { opacity: 1; transform: translateY(0); }
  .item .name { font-size: 16px; font-weight: 500; color: var(--zinc-800); }
  .item .meta { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--zinc-400); margin-top: 2px; }
  .item .price { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; color: var(--zinc-900); }

  .total-bar {
    padding: 20px 32px;
    border-top: 2px solid var(--zinc-900);
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .total-bar.show { opacity: 1; }
  .total-bar .label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--zinc-500); }
  .total-bar .amount { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: var(--blue); }

  .btn-pay {
    margin: 0 32px 24px;
    padding: 16px;
    background: var(--yellow);
    color: var(--blue-dark);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateY(4px);
  }

  .btn-pay.show { opacity: 1; transform: translateY(0); }
  .btn-pay.success { background: var(--green); color: white; }

  /* ─── Right panel ─── */
  .right {
    flex: 0.55;
    display: flex;
    flex-direction: column;
    background: var(--zinc-50);
  }

  .cloud-stats { padding: 0 28px; }

  .stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px solid var(--zinc-100);
  }

  .stat .label { font-size: 13px; color: var(--zinc-400); }
  .stat .value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: var(--zinc-900); transition: all 0.3s ease; }

  .queue {
    margin-top: auto;
    border-top: 1px solid var(--zinc-200);
    padding: 20px 28px;
  }

  .queue-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--zinc-400);
    margin-bottom: 12px;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.4s ease;
  }

  .q-item.show { opacity: 1; transform: translateX(0); }

  .q-item .dot { width: 8px; height: 8px; flex-shrink: 0; transition: background 0.3s ease; }
  .q-item .dot.pending { background: var(--yellow); }
  .q-item .dot.synced { background: var(--green); }
  .q-item .dot.processing { background: var(--blue); animation: blink 1s ease infinite; }

  .q-item .id { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--zinc-500); }

  .q-item .status {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .q-item .status.pending { color: var(--yellow); }
  .q-item .status.synced { color: var(--green); }
  .q-item .status.processing { color: var(--blue); }

  /* ─── Banner ─── */
  .banner {
    padding: 16px 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    transition: all 0.5s ease;
    background: var(--zinc-100);
    color: var(--zinc-400);
  }

  .banner.online { background: var(--green-soft); color: var(--green); }
  .banner.offline { background: var(--red-soft); color: var(--red); }
  .banner.syncing { background: var(--yellow-soft); color: var(--blue); }
  .banner.done { background: var(--green-soft); color: var(--green); }

  /* ─── Phases ─── */
  .phases {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: white;
    border-top: 1px solid var(--zinc-100);
  }

  .phase { width: 6px; height: 6px; background: var(--zinc-300); transition: all 0.5s ease; }
  .phase.active { background: var(--blue); width: 28px; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="scene">
  <div class="topbar">
    <span class="brand">Cuxibamba</span>
    <div class="wifi">
      <div class="wifi-dot" id="wifiDot"></div>
      <span class="wifi-label" id="wifiLabel">Online</span>
    </div>
  </div>

  <div class="main">
    <div class="pos">
      <p class="section-title">Punto de venta</p>
      <div class="pos-items" id="items"></div>
      <div class="total-bar" id="totalBar">
        <span class="label">Total</span>
        <span class="amount" id="totalAmount">$0.00</span>
      </div>
      <button class="btn-pay" id="btnPay">Cobrar</button>
    </div>

    <div class="right">
      <p class="section-title">Servidor central</p>
      <div class="cloud-stats">
        <div class="stat"><span class="label">Órdenes hoy</span><span class="value" id="cOrders">24</span></div>
        <div class="stat"><span class="label">Ventas</span><span class="value" id="cSales">$2,180.50</span></div>
        <div class="stat"><span class="label">Sucursales</span><span class="value">3 activas</span></div>
        <div class="stat"><span class="label">Última sync</span><span class="value" id="cSync">Ahora</span></div>
      </div>
      <div class="queue">
        <p class="queue-title">Cola de sincronización</p>
        <div id="queue"></div>
      </div>
    </div>
  </div>

  <div class="banner online" id="banner">Sistema operativo — conexión estable</div>

  <div class="phases">
    <div class="phase" id="ph0"></div>
    <div class="phase" id="ph1"></div>
    <div class="phase" id="ph2"></div>
    <div class="phase" id="ph3"></div>
    <div class="phase" id="ph4"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const catalog = [
  { name: 'Paracetamol 500mg', qty: 2, unit: 1.50 },
  { name: 'Ibuprofeno 400mg', qty: 1, unit: 2.80 },
  { name: 'Vitamina C', qty: 3, unit: 4.20 },
  { name: 'Alcohol antiséptico', qty: 1, unit: 3.50 },
  { name: 'Omeprazol 20mg', qty: 2, unit: 5.60 },
  { name: 'Loratadina 10mg', qty: 1, unit: 1.90 },
];
let cloudOrders = 24, cloudSales = 2180.50;
const wait = ms => new Promise(r => setTimeout(r, ms));

function setPhase(n) { for (let i = 0; i < 5; i++) $('ph'+i).className = 'phase' + (i===n ? ' active' : ''); }
function setBanner(t, c) { const b=$('banner'); b.textContent=t; b.className='banner '+c; }
function setWifi(on) { $('wifiDot').className='wifi-dot'+(on?'':' off'); $('wifiLabel').textContent=on?'Online':'Sin conexión'; }

function addItem(p) {
  const d = document.createElement('div'); d.className='item';
  d.innerHTML=`<div><div class="name">${p.name}</div><div class="meta">×${p.qty} — $${p.unit.toFixed(2)} c/u</div></div><div class="price">$${(p.qty*p.unit).toFixed(2)}</div>`;
  $('items').appendChild(d);
  return new Promise(r => requestAnimationFrame(() => { d.classList.add('show'); r(); }));
}

function showTotal(items) {
  const t = items.reduce((s,p) => s+p.qty*p.unit, 0);
  $('totalAmount').textContent = '$'+t.toFixed(2);
  $('totalBar').classList.add('show');
  $('btnPay').classList.add('show');
  return t;
}

function pay() {
  return new Promise(r => { $('btnPay').textContent='Procesando...'; setTimeout(() => { $('btnPay').classList.add('success'); $('btnPay').textContent='Venta completada'; r(); }, 700); });
}

function clearPOS() {
  $('items').innerHTML=''; $('totalBar').classList.remove('show');
  const b=$('btnPay'); b.classList.remove('show','success'); b.textContent='Cobrar';
}

function addQueue(id, status) {
  const ex = $('queue').querySelector(`[data-id="${id}"]`);
  const label = status==='synced'?'sincronizado':status==='processing'?'subiendo...':'pendiente';
  if (ex) { ex.querySelector('.dot').className='dot '+status; const s=ex.querySelector('.status'); s.className='status '+status; s.textContent=label; return; }
  const d = document.createElement('div'); d.className='q-item'; d.dataset.id=id;
  d.innerHTML=`<span class="dot ${status}"></span><span class="id">#ORD-${id}</span><span class="status ${status}">${label}</span>`;
  $('queue').appendChild(d);
  requestAnimationFrame(() => d.classList.add('show'));
}

function updateCloud(amount) {
  cloudOrders++; cloudSales+=amount;
  $('cOrders').textContent=cloudOrders;
  $('cSales').textContent='$'+cloudSales.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  $('cSync').textContent='Ahora';
}

async function run() {
  setPhase(0);
  setBanner('Venta en curso — conexión estable', 'online');
  for (const p of catalog.slice(0,2)) { await addItem(p); await wait(500); }
  await wait(300); const t1 = showTotal(catalog.slice(0,2));
  await wait(1200); await pay();
  addQueue('0048','synced'); updateCloud(t1);
  setBanner('Orden #0048 sincronizada al servidor', 'done');
  await wait(2500);

  setPhase(1); clearPOS(); setWifi(false);
  setBanner('Conexión perdida — modo offline activado', 'offline');
  $('cSync').textContent='2 min'; await wait(2500);

  setPhase(2);
  setBanner('Modo offline — ventas continúan', 'offline');
  for (const p of catalog.slice(2,4)) { await addItem(p); await wait(500); }
  await wait(300); const t2 = showTotal(catalog.slice(2,4));
  await wait(1200); await pay();
  addQueue('0049','pending');
  setBanner('Orden #0049 en cola local', 'syncing');
  await wait(2000);

  clearPOS();
  for (const p of catalog.slice(4,6)) { await addItem(p); await wait(500); }
  await wait(300); const t3 = showTotal(catalog.slice(4,6));
  await wait(1200); await pay();
  addQueue('0050','pending');
  setBanner('2 órdenes en cola — esperando reconexión', 'syncing');
  $('cSync').textContent='5 min'; await wait(3000);

  setPhase(3); clearPOS(); setWifi(true);
  setBanner('Reconectado — sincronizando cola...', 'syncing');
  await wait(1200);
  addQueue('0049','processing'); setBanner('Subiendo #0049...', 'syncing'); await wait(1500);
  addQueue('0049','synced'); updateCloud(t2); await wait(800);
  addQueue('0050','processing'); setBanner('Subiendo #0050...', 'syncing'); await wait(1500);
  addQueue('0050','synced'); updateCloud(t3); await wait(500);

  setPhase(4);
  setBanner('Todo sincronizado — 0 pendientes', 'done');
  await wait(4000);

  $('queue').innerHTML=''; clearPOS(); setWifi(true);
  cloudOrders=24; cloudSales=2180.50;
  $('cOrders').textContent='24'; $('cSales').textContent='$2,180.50'; $('cSync').textContent='Ahora';
  run();
}

setTimeout(run, 800);
</script>
</body>
</html>
